<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Infinity Mirror – Etched Mode</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    background: #000;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* BUTTON */
.upload-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    background: cyan;
    color: black;
    padding: 10px 16px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px;
    z-index: 50;
}

#upload { display: none; }

/* SCENE */
.scene {
    perspective: 1100px;
}

/* MIRROR */
.mirror {
    width: 520px;
    height: 520px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.15s ease;
    border-radius: 14px;
}

/* GLOW */
.edge-glow {
    position: absolute;
    inset: 0;
    border-radius: 14px;
    box-shadow:
        0 0 40px rgba(0,255,255,0.9),
        0 0 120px rgba(0,255,255,0.6),
        inset 0 0 50px rgba(0,255,255,0.3);
}

/* DEPTH */
.depth {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
}

.layer {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100%;
    height: 100%;
    transform-origin: center;
    border: 2px solid rgba(0,255,255,0.9);
    box-shadow: 0 0 30px rgba(0,255,255,0.9);
}

.layer:nth-child(1) { transform: translate(-50%, -50%) scale(1) translateZ(0px); }
.layer:nth-child(2) { transform: translate(-50%, -50%) scale(0.85) translateZ(-80px); }
.layer:nth-child(3) { transform: translate(-50%, -50%) scale(0.7) translateZ(-160px); }
.layer:nth-child(4) { transform: translate(-50%, -50%) scale(0.55) translateZ(-240px); }
.layer:nth-child(5) { transform: translate(-50%, -50%) scale(0.4) translateZ(-320px); }
.layer:nth-child(6) { transform: translate(-50%, -50%) scale(0.3) translateZ(-400px); }
.layer:nth-child(7) { transform: translate(-50%, -50%) scale(0.2) translateZ(-480px); }
.layer:nth-child(8) { transform: translate(-50%, -50%) scale(0.1) translateZ(-560px); }

/* 🔥 ETCHED IMAGE */
.center-img {
    display: none;
    position: absolute;
    width: 220px;
    height: 220px;
    top: 50%;
    left: 50%;

    transform: translate(-50%, -50%) translateZ(60px);

    object-fit: contain;

    /* THIS is the magic */
    mix-blend-mode: screen;

    filter:
        grayscale(1)
        contrast(2)
        brightness(2.2)
        drop-shadow(0 0 6px rgba(0,255,255,0.9))
        drop-shadow(0 0 20px rgba(0,255,255,0.7));

    opacity: 0.95;
}

/* GLASS FADE */
.fade {
    position: absolute;
    inset: 0;
    border-radius: 14px;
    background: radial-gradient(circle,
        transparent 30%,
        rgba(0,0,0,0.75) 75%,
        black 100%);
}
</style>
</head>

<body>

<div class="upload-btn" id="uploadBtn">UPLOAD IMAGE</div>
<input type="file" id="upload" accept="image/*">

<div class="scene">
    <div class="mirror" id="mirror">

        <div class="depth">
            <div class="layer"></div>
            <div class="layer"></div>
            <div class="layer"></div>
            <div class="layer"></div>
            <div class="layer"></div>
            <div class="layer"></div>
            <div class="layer"></div>
            <div class="layer"></div>

            <img id="centerImage" class="center-img">
            <div class="fade"></div>
        </div>

        <div class="edge-glow"></div>

    </div>
</div>

<script>
const mirror = document.getElementById("mirror");
const upload = document.getElementById("upload");
const btn = document.getElementById("uploadBtn");
const img = document.getElementById("centerImage");

/* OPEN FILE PICKER */
btn.addEventListener("click", () => upload.click());

/* TILT */
document.addEventListener("mousemove", (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 30;
    const y = (e.clientY / window.innerHeight - 0.5) * -30;
    mirror.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* LOAD IMAGE */
upload.addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (file) {
        const url = URL.createObjectURL(file);
        img.src = url;
        img.style.display = "block";
    }
});
</script>

</body>
</html>
